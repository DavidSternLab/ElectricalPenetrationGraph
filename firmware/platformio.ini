; PlatformIO build for the EPG RP2040 firmware (arduino-pico / earlephilhower core).
; Build:  pio run            Flash: pio run -t upload      Monitor: pio device monitor
;
; The portable protocol library (../proto/epg_proto.c) is compiled alongside src/ and is
; the SAME code unit-tested on the host in test/ — so the wire format cannot drift.

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
build_flags = -I proto -Wall
build_src_filter = +<*> +<../proto/epg_proto.c>
; USB CDC stack (earlephilhower core): use the built-in USB serial
build_unflags =
monitor_speed = 115200
